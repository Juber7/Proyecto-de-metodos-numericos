<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Métodos Numéricos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background-color: #f8f9fa; }
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        /* Estilos de la barra lateral */
        .sidebar { width: 280px; background-color: #212529; color: white; padding-top: 20px; }
        .sidebar a { color: #ced4da; text-decoration: none; padding: 10px 20px; display: block; border-radius: 4px; margin: 2px 10px; }
        .sidebar a:hover { background-color: #495057; color: white; }
        .sidebar .active { background-color: #0d6efd; color: white; }
        /* Contenedor principal */
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        /* Ajuste para submenús */
        .submenu a { padding-left: 40px; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="wrapper">
        <nav class="sidebar">
            <h4 class="text-center text-white mb-4"><i class="bi bi-calculator"></i> Menú Numérico</h4>
            
            <a href="/"><i class="bi bi-house-door"></i> Inicio</a>
            
            <a href="#submenuRaices" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center">
                <span><i class="bi bi-graph-up"></i> Raíces de Ecuaciones</span>
                <i class="bi bi-chevron-down small"></i>
            </a>
            <div class="collapse show" id="submenuRaices"> <div class="submenu">
                    <a href="#submenuCerrados" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center text-warning">
                        Métodos Cerrados <i class="bi bi-chevron-down small"></i>
                    </a>
                    <div class="collapse show" id="submenuCerrados">
                        <a href="/biseccion">- Bisección</a>
                        </div>
                </div>

                <div class="submenu mt-1">
                    <a href="#submenuAbiertos" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center text-warning">
                        Métodos Abiertos <i class="bi bi-chevron-down small"></i>
                    </a>
                    <div class="collapse" id="submenuAbiertos">
                        <a href="#">- Newton-Raphson</a>
                        <a href="#">- Secante</a>
                    </div>
                </div>

            </div>

            <a href="#" class="mt-2"><i class="bi bi-bar-chart-steps"></i> Series de Taylor</a>

        </nav>

        <main class="content">
            {% block contenido %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
